<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" font-family="'Segoe UI',system-ui,sans-serif">
<style>
  .orb { transform-box: fill-box; transform-origin: center; animation: drift 9s ease-in-out infinite; }
  .orb.b { animation-delay: -4.5s; }
  @keyframes drift { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(26px,-14px) scale(1.12) } }
  .word { opacity: 0; animation: cycle 12s linear infinite; }
  @keyframes cycle { 0%,4% { opacity:0 } 8%,27% { opacity:1 } 31%,100% { opacity:0 } }
  .cursor { animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
  .spark { animation: spark 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes spark { 0%,100% { opacity:.25; transform: scale(.8) } 50% { opacity:1; transform: scale(1.15) } }
</style>
<defs>
  <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#a78bfa"/><stop offset="0.5" stop-color="#7c5cff"/><stop offset="1" stop-color="#22d3ee"/>
  </linearGradient>
  <clipPath id="frame"><rect x="1" y="1" width="878" height="238" rx="16"/></clipPath>
</defs>
<rect x="1" y="1" width="878" height="238" rx="16" fill="#0e0e16" stroke="#7c5cff" stroke-opacity="0.28"/>
<g clip-path="url(#frame)">
  <circle class="orb" cx="790" cy="30" r="120" fill="#7c5cff" opacity="0.16"/>
  <circle class="orb b" cx="80" cy="220" r="100" fill="#22d3ee" opacity="0.12"/>
</g>
<circle class="spark" cx="716" cy="66" r="3" fill="#22d3ee"/>
<circle class="spark" cx="762" cy="112" r="2.5" fill="#a78bfa" style="animation-delay:-1.2s"/>
<circle class="spark" cx="806" cy="78" r="2" fill="#7c5cff" style="animation-delay:-2.3s"/>
<circle class="spark" cx="840" cy="130" r="2.5" fill="#22d3ee" style="animation-delay:-0.6s"/>

<text x="36" y="76" fill="#e8e8f4" font-size="38" font-weight="800">Nicola Cucurachi <tspan fill="#9a9ab0" font-size="20" font-weight="600">· adoslabs / Zeli Srl · Italy 🇮🇹</tspan></text>
<text x="36" y="118" font-size="24" font-weight="700" fill="url(#g)">I build private, self-hosted AI — from the dataset to the device.</text>

<text x="36" y="168" fill="#9a9ab0" font-size="18" font-weight="600">Currently shipping:</text>
<g font-size="18" font-weight="700">
  <text class="word" x="216" y="168" fill="#22d3ee" style="animation-delay:0s">on-device AI assistants (Rust + llama.cpp)</text>
  <text class="word" x="216" y="168" fill="#a78bfa" style="animation-delay:-3s">multi-agent orchestration &amp; AI↔AI networks</text>
  <text class="word" x="216" y="168" fill="#8fc9a6" style="animation-delay:-6s">LLM fine-tuning · SFT + KTO · distillation</text>
  <text class="word" x="216" y="168" fill="#ffb86b" style="animation-delay:-9s">EU-hosted SaaS · container-per-tenant · GDPR-native</text>
</g>
<rect class="cursor" x="36" y="186" width="12" height="4" fill="#22d3ee"/>
<text x="36" y="216" fill="#6b6b85" font-size="13.5">100% AI-orchestrated development — every product below was built end-to-end by directing AI agents. That's the craft.</text>
</svg>
